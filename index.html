<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Biblioteca con Amor 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital@0;1&family=Quicksand:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink-deep:    #e8a0b4;
      --pink-mid:     #f2bfcf;
      --pink-light:   #fde8ef;
      --pink-pale:    #fff5f8;
      --peach:        #fdd5b0;
      --lavender:     #ddc8f0;
      --mint:         #c8eadd;
      --cream:        #fef9f0;
      --text-dark:    #4a2c3a;
      --text-mid:     #7a4a5e;
      --text-light:   #b07a90;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--pink-pale);
      font-family: 'Quicksand', sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND BLOBS ── */
    .blobs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: .35;
      animation: float 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 420px; height: 420px; background: var(--pink-mid);  top: -80px;  left: -80px;  animation-duration: 13s; }
    .blob-2 { width: 320px; height: 320px; background: var(--lavender);  top: 30%;    right: -60px; animation-duration: 17s; animation-delay: -4s; }
    .blob-3 { width: 280px; height: 280px; background: var(--peach);     bottom: 10%; left: 10%;    animation-duration: 15s; animation-delay: -7s; }
    .blob-4 { width: 200px; height: 200px; background: var(--mint);      bottom: 5%;  right: 15%;   animation-duration: 19s; animation-delay: -2s; }
    @keyframes float {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-40px) scale(1.07); }
    }

    /* ── MAIN WRAPPER ── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 64px;
      animation: fadeUp .9s ease both;
    }
    .paw-row {
      font-size: 1.7rem;
      letter-spacing: .3rem;
      margin-bottom: 16px;
      animation: bounce 2.2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.15;
    }
    header h1 em {
      font-style: italic;
      color: var(--pink-deep);
    }
    header p {
      margin-top: 14px;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--text-mid);
      line-height: 1.7;
    }
    .divider {
      margin: 28px auto 0;
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--pink-deep), var(--lavender));
      border-radius: 99px;
    }

    /* ── BOOK SHELF ILLUSTRATION ── */
    .shelf-wrap {
      background: white;
      border-radius: 28px;
      padding: 40px 32px 36px;
      box-shadow: 0 4px 32px rgba(180,100,130,.10);
      border: 1.5px solid rgba(232,160,180,.2);
      margin-bottom: 48px;
      animation: fadeUp .9s .3s ease both;
    }
    .shelf-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: var(--text-dark);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .shelf-title span { font-size: 1.5rem; }

    /* SVG Shelf */
    .svg-shelf { width: 100%; height: auto; }

    /* ── COMING SOON BANNER ── */
    .coming-soon {
      text-align: center;
      padding: 48px 24px;
      background: linear-gradient(135deg, #fde8ef 0%, #f0d8f8 50%, #d8eef4 100%);
      border-radius: 28px;
      box-shadow: 0 4px 32px rgba(180,100,130,.12);
      animation: fadeUp .9s .45s ease both;
    }
    .coming-soon .dog { font-size: 5rem; margin-bottom: 16px; display: block;
      animation: wag 3.5s ease-in-out infinite; transform-origin: bottom center; }
    
    .dog-photo {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid white;
      box-shadow: 0 8px 32px rgba(232,160,180,.45);
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      animation: wag 3.5s ease-in-out infinite;
      transform-origin: bottom center;
    }

    @keyframes wag {
      0%,100% { transform: rotate(-2deg); }
      50%      { transform: rotate(2deg); }
    }
    .coming-soon h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: var(--text-dark);
      margin-bottom: 12px;
    }
    .coming-soon p {
      font-family: 'Lora', serif;
      font-style: italic;
      color: var(--text-mid);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 24px;
    }
    .pill {
      display: inline-block;
      background: var(--pink-deep);
      color: white;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: .88rem;
      padding: 10px 26px;
      border-radius: 99px;
      letter-spacing: .04em;
      box-shadow: 0 4px 18px rgba(232,160,180,.45);
      transition: transform .2s, box-shadow .2s;
    }
    .pill:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(232,160,180,.55);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      margin-top: 60px;
      font-size: .82rem;
      color: var(--text-light);
      font-family: 'Lora', serif;
      font-style: italic;
      animation: fadeUp 1s .6s ease both;
    }
    footer span { color: var(--pink-deep); }

    /* ── FLOATING PAWS ── */
    .floating-paw {
      position: fixed;
      font-size: 1.3rem;
      opacity: 0;
      pointer-events: none;
      animation: drift 8s ease-in-out infinite;
    }
    .floating-paw:nth-child(1) { left:  5%; top: 20%; animation-delay: 0s;   animation-duration:  9s; }
    .floating-paw:nth-child(2) { right: 8%; top: 40%; animation-delay: 2.5s; animation-duration: 11s; }
    .floating-paw:nth-child(3) { left: 12%; bottom:25%; animation-delay:5s;  animation-duration: 13s; }
    .floating-paw:nth-child(4) { right:4%;  bottom:15%; animation-delay:1s;  animation-duration: 10s; }
    @keyframes drift {
      0%   { opacity:0; transform: translateY(20px) rotate(-10deg); }
      20%  { opacity:.25; }
      80%  { opacity:.18; }
      100% { opacity:0; transform: translateY(-60px) rotate(15deg); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(28px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
